}

[data-theme="light"] {
  color-scheme: light;
  --md-sys-color-primary: #3a8a9b;
  --md-sys-color-on-primary: #ffffff;
  --md-sys-color-primary-container: #d2eef5;
  --md-sys-color-on-primary-container: #0b5c6b;
  --md-sys-color-secondary: #555555;
  --md-sys-color-on-secondary: #ffffff;
  --md-sys-color-surface: #fafaf9;
  --md-sys-color-surface-container: #f0efed;
  --md-sys-color-surface-container-high: #e8e7e5;
  --md-sys-color-surface-variant: #e0dfdd;

  --md-sys-color-on-surface-variant: #555555;
  --md-sys-color-outline: #888888;
  --md-sys-color-outline-variant: #d0cfcd;
  --md-sys-color-error: #b04040;

  --accent-red: #b04040;
  --accent-amber: #b88030;
  --accent-green: #4a8a4a;

  --event-tomato: #d93025;
  --event-flamingo: #e67c73;
  --event-tangerine: #f6bf26;
  --event-sage: #33b679;
  --event-basil: #0b8043;
  --event-peacock: #039be5;
  --event-blueberry: #3f51b5;
  --event-lavender: #7986cb;
  --event-grape: #8e24aa;
  --event-graphite: #616161;

  --md-sys-elevation-1: 0 2px 8px rgba(0, 0, 0, 0.08);
  --md-sys-elevation-2: 0 4px 14px rgba(0, 0, 0, 0.12);
  --md-sys-elevation-3: 0 6px 20px rgba(0, 0, 0, 0.15);
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
}

body {
  background: var(--md-sys-color-surface);
  color: var(--md-sys-color-on-surface);
  font-family: 'DM Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: auto;
}

button,
input,
textarea,
select {
  font: inherit;
}

.dashboard {
  max-width: 1280px;
  margin: 0 auto;
  padding: 14px 12px 24px;
  display: grid;
  gap: 12px;
}

/* ── Top bar ─────────────────────────────────────────────────────────── */
.top-bar {
  background: var(--md-sys-color-surface-container);
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: var(--radius-md);
  box-shadow: var(--md-sys-elevation-1);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.top-bar h1 {
  margin: 0;
  font-size: 1.15rem;
  font-weight: 500;
  letter-spacing: -0.01em;
}

.top-sub {
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.82rem;
  margin-top: 2px;
}

.quick-stats {
  display: inline-flex;
  gap: 8px;
  flex-wrap: wrap;
}

.stat-chip {
  border-radius: 999px;
  border: 1px solid var(--md-sys-color-outline-variant);
  background: var(--md-sys-color-surface-variant);
  color: var(--md-sys-color-on-surface-variant);
  padding: 5px 10px;
  font-size: 0.76rem;
  font-weight: 500;
}

/* ── Two-column layout ───────────────────────────────────────────────── */
.main-grid {
  display: grid;
  grid-template-columns: minmax(0, 65fr) minmax(320px, 35fr);
  gap: 16px;
}

.main-grid-full {
  grid-template-columns: 1fr;
}

.surface {
  background: var(--md-sys-color-surface-container);
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: var(--radius-md);
  box-shadow: var(--md-sys-elevation-1);
}

.calendar-shell {
  padding: 14px;
  overflow-x: auto;
}

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  gap: 10px;
}

.section-title {
  font-size: 0.82rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--md-sys-color-on-surface-variant);
}

.section-subtitle {
  font-size: 0.78rem;
  color: var(--md-sys-color-outline);
}

/* ── Navigation / chip buttons ───────────────────────────────────────── */
.week-nav {
  display: inline-flex;
  gap: 6px;
}

.calendar-actions {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.calendar-select {
  position: relative;
}

.calendar-select summary {
  list-style: none;
}

.calendar-select summary::-webkit-details-marker {
  display: none;
}

.calendar-select-list {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  min-width: 260px;
  max-height: 260px;
  overflow: auto;
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: var(--radius-sm);
  background: var(--md-sys-color-surface-container-high);
  box-shadow: var(--md-sys-elevation-2);
  padding: 8px;
  z-index: 30;
  display: grid;
  gap: 6px;
}

.calendar-option {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  align-items: center;
  gap: 8px;
  font-size: 0.76rem;
  color: var(--md-sys-color-on-surface);
}

.calendar-option small {
  color: var(--md-sys-color-outline);
  font-size: 0.68rem;
}

.nav-btn,
.chip-btn,
.action-btn {
  border: 1px solid var(--md-sys-color-outline-variant);
  background: transparent;
  color: var(--md-sys-color-on-surface-variant);
  border-radius: 999px;
  padding: 5px 10px;
  font-size: 0.76rem;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.nav-btn:hover,
.chip-btn:hover,
.action-btn:hover {
  background: color-mix(in srgb, var(--md-sys-color-primary) 12%, transparent);
  border-color: var(--md-sys-color-primary);
  color: var(--md-sys-color-primary);
}

/* ── Weekly calendar grid ────────────────────────────────────────────── */
.week-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(150px, 1fr));
  gap: 8px;
  position: relative;
  isolation: isolate;
  overflow-x: auto;
  padding-bottom: 6px;
  scrollbar-gutter: stable both-edges;
}

.day-col {
  background: var(--md-sys-color-surface-container-high);
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: var(--radius-sm);
  padding: 8px;
  min-height: 420px;
  overflow: visible;
  position: relative;
  z-index: 1;
}

.day-col:hover {
  z-index: 15;
}

.day-col.today {
  border-color: var(--md-sys-color-primary);
  background: color-mix(in srgb, var(--md-sys-color-primary) 5%, var(--md-sys-color-surface-container-high));
}

.day-head {
  font-size: 0.76rem;
  color: var(--md-sys-color-on-surface-variant);
  margin-bottom: 8px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
}

.day-col.today .day-head {
  color: var(--md-sys-color-primary);
}

.day-all-day {
  display: grid;
  gap: 4px;
  margin-bottom: 8px;
}

.all-day-chip {
  font-size: 0.72rem;
  border-radius: var(--radius-xs);
  padding: 3px 7px;
  background: color-mix(in srgb, var(--md-sys-color-primary) 15%, transparent);
  color: var(--md-sys-color-primary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.3;
}

.day-events {
  display: grid;
  gap: 6px;
  overflow: visible;
}

/* ── Event card ──────────────────────────────────────────────────────── */
.calendar-event {
  border-radius: var(--radius-xs);
  border-left: 3px solid var(--event-color);
  background: color-mix(in srgb, var(--event-color) 10%, var(--md-sys-color-surface-container));
  padding: 7px 8px;
  cursor: pointer;
  position: relative;
  z-index: 1;
  transition: background 0.15s;
}

.calendar-event:hover {
  background: color-mix(in srgb, var(--event-color) 20%, var(--md-sys-color-surface-container));
  z-index: 120;
}

.event-time {
  font-size: 0.7rem;
  color: var(--md-sys-color-outline);
  font-weight: 600;
  letter-spacing: 0.01em;
}

.event-title {
  font-size: 0.78rem;
  font-weight: 500;
  margin-top: 1px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.event-meta {
  margin-top: 2px;
  color: var(--md-sys-color-outline);
  font-size: 0.7rem;
}

/* ── Event hover tooltip ─────────────────────────────────────────────── */
.event-hover {
  display: none !important;
}

.event-tooltip-layer {
  position: fixed;
  z-index: 2147483000;
  border-radius: var(--radius-sm);
  border: 1px solid var(--md-sys-color-outline-variant);
  background: var(--md-sys-color-surface-container-high);
  box-shadow: var(--md-sys-elevation-2);
  padding: 8px 10px;
  font-size: 0.74rem;
  line-height: 1.45;
  color: var(--md-sys-color-on-surface);
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 220px;
  max-width: 320px;
  overflow-y: auto;
  pointer-events: none;
}

/* ── Event inline actions (shown on hover) ───────────────────────────── */
.event-actions {
  margin-top: 4px;
  display: none;
  flex-wrap: wrap;
  gap: 3px;
}

.calendar-event:hover .event-actions {
  display: flex;
}

.rsvp-chip {
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: 999px;
  background: transparent;
  font-size: 0.68rem;
  padding: 2px 7px;
  cursor: pointer;
  color: var(--md-sys-color-on-surface-variant);
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.rsvp-chip:hover {
  border-color: var(--md-sys-color-primary);
  color: var(--md-sys-color-primary);
}

.rsvp-chip.active {
  background: var(--md-sys-color-primary);
  border-color: var(--md-sys-color-primary);
  color: var(--md-sys-color-on-primary);
}

/* ── Sidebar ─────────────────────────────────────────────────────────── */
.sidebar {
  display: grid;
  gap: 12px;
  align-content: start;
}

.inbox-shell {
  padding: 12px;
}

/* ── Inbox ────────────────────────────────────────────────────────────── */
.inbox-list {
  display: grid;
  gap: 1px;
  max-height: 460px;
  overflow: auto;
}

.inbox-row {
  display: grid;
  grid-template-columns: 30px minmax(0, 1fr) auto;
  align-items: center;
  gap: 8px;
  padding: 7px 6px;
  border-radius: var(--radius-xs);
  cursor: pointer;
  transition: background 0.12s;
}

.inbox-row:hover {
  background: var(--md-sys-color-surface-variant);
}

.inbox-row.unread {
  background: color-mix(in srgb, var(--md-sys-color-primary) 10%, transparent);
}

.avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: color-mix(in srgb, var(--md-sys-color-primary) 18%, transparent);
  color: var(--md-sys-color-primary);
  display: grid;
  place-items: center;
  font-size: 0.72rem;
  font-weight: 700;
}

.mail-content {
  min-width: 0;
}

.mail-subject {
  font-size: 0.78rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--md-sys-color-on-surface);
}

.mail-subject.unread {
  font-weight: 700;
  color: var(--md-sys-color-primary);
}

.mail-subline {
  font-size: 0.7rem;
  color: var(--md-sys-color-outline);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.mail-date {
  font-size: 0.68rem;
  color: var(--md-sys-color-outline);
  padding-left: 6px;
  white-space: nowrap;
}

/* ── Overlay panels (event detail / email detail) ────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: grid;
  place-items: center;
  padding: 20px;
  z-index: 50;
}

.panel {
  width: min(780px, 94vw);
  max-height: 88vh;
  overflow: auto;
  border-radius: var(--radius-lg);
  border: 1px solid var(--md-sys-color-outline-variant);
  background: var(--md-sys-color-surface-container);
  box-shadow: var(--md-sys-elevation-3);
  padding: 18px;
}

.panel-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.panel-title {
  font-size: 1.05rem;
  font-weight: 500;
  letter-spacing: -0.01em;
}

.panel-sub {
  font-size: 0.8rem;
  color: var(--md-sys-color-on-surface-variant);
  margin-top: 2px;
}

.panel-body {
  margin-top: 14px;
  display: grid;
  gap: 10px;
}

.event-editor-form {
  display: grid;
  gap: 10px;
}

.editor-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.editor-field {
  display: grid;
  gap: 4px;
  font-size: 0.74rem;
  color: var(--md-sys-color-on-surface-variant);
}

.editor-field input,
.editor-field textarea,
.editor-field select {
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: var(--radius-xs);
  background: var(--md-sys-color-surface-container-high);
  color: var(--md-sys-color-on-surface);
  padding: 7px 8px;
}

.editor-field textarea {
  min-height: 76px;
  resize: vertical;
}

.editor-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  flex-wrap: wrap;
}

.inline-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.76rem;
  color: var(--md-sys-color-on-surface-variant);
}

.banner {
  border-radius: var(--radius-sm);
  border: 1px solid var(--md-sys-color-outline-variant);
  background: var(--md-sys-color-surface-container);
  color: var(--md-sys-color-on-surface-variant);
  padding: 8px 10px;
  font-size: 0.76rem;
}

.banner.error {
  border-color: color-mix(in srgb, var(--md-sys-color-error) 70%, transparent);
  color: var(--md-sys-color-error);
}

.detail-block {
  background: var(--md-sys-color-surface-container-high);
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 0.8rem;
  line-height: 1.5;
}

.detail-block a {
  color: var(--md-sys-color-primary);
  text-decoration: none;
}

.detail-block a:hover {
  text-decoration: underline;
}

.attendee-list {
  margin: 0;
  padding-left: 18px;
  display: grid;
  gap: 4px;
}

.attachment-list {
  margin: 0;
  padding-left: 18px;
  display: grid;
  gap: 6px;
}

.attachment-link {
  color: var(--md-sys-color-primary);
  text-decoration: none;
}

.attachment-link:hover {
  text-decoration: underline;
}

.email-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.email-chip {
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: 999px;
  background: transparent;
  font-size: 0.72rem;
  padding: 5px 10px;
  cursor: pointer;
  color: var(--md-sys-color-on-surface-variant);
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.email-chip:hover {
  border-color: var(--md-sys-color-primary);
  color: var(--md-sys-color-primary);
  background: color-mix(in srgb, var(--md-sys-color-primary) 12%, transparent);
}

.email-chip.active {
  border-color: var(--md-sys-color-primary);
  color: var(--md-sys-color-on-primary);
  background: var(--md-sys-color-primary);
}

.email-statuses {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.email-meta-grid {
  display: grid;
  gap: 8px;
}

.email-body-block {
  padding: 0;
  overflow: hidden;
}

.email-body-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--md-sys-color-outline-variant);
  background: color-mix(in srgb, var(--md-sys-color-surface-container) 82%, transparent);
}

.email-body-mode {
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--md-sys-color-on-surface-variant);
}

.email-body-content {
  padding: 16px 18px;
  max-height: min(58vh, 760px);
  overflow: auto;
  background:
    linear-gradient(180deg, color-mix(in srgb, var(--md-sys-color-surface) 88%, transparent), transparent 90px),
    var(--md-sys-color-surface-container-high);
  color: var(--md-sys-color-on-surface);
}

.email-body-content p,
.email-body-content ul,
.email-body-content ol,
.email-body-content pre,
.email-body-content blockquote,
.email-body-content table,
.email-body-content h1,
.email-body-content h2,
.email-body-content h3,
.email-body-content h4,
.email-body-content h5,
.email-body-content h6 {
  margin: 0 0 0.9rem;
}

.email-body-content p:last-child,
.email-body-content ul:last-child,
.email-body-content ol:last-child,
.email-body-content pre:last-child,
.email-body-content blockquote:last-child,
.email-body-content table:last-child {
  margin-bottom: 0;
}

.email-body-content h1,
.email-body-content h2,
.email-body-content h3,
.email-body-content h4,
.email-body-content h5,
.email-body-content h6 {
  line-height: 1.25;
  color: var(--md-sys-color-on-surface);
}

.email-body-content h1 { font-size: 1.35rem; }
.email-body-content h2 { font-size: 1.2rem; }
.email-body-content h3 { font-size: 1.06rem; }
.email-body-content h4,
.email-body-content h5,
.email-body-content h6 { font-size: 0.95rem; }

.email-body-content ul,
.email-body-content ol {
  padding-left: 1.25rem;
}

.email-body-content li + li {
  margin-top: 0.35rem;
}

.email-body-content blockquote {
  padding: 0.85rem 1rem;
  border-left: 3px solid color-mix(in srgb, var(--md-sys-color-primary) 70%, transparent);
  background: color-mix(in srgb, var(--md-sys-color-primary) 8%, transparent);
  color: var(--md-sys-color-on-surface-variant);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}

.email-body-content pre,
.email-body-content code {
  font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
}

.email-body-content pre {
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  padding: 0.9rem 1rem;
  border-radius: var(--radius-sm);
  background: color-mix(in srgb, var(--md-sys-color-surface-container-highest) 84%, transparent);
  border: 1px solid var(--md-sys-color-outline-variant);
}

.email-body-content table {
  width: 100%;
  border-collapse: collapse;
  display: block;
  overflow-x: auto;
}

.email-body-content th,
.email-body-content td {
  border: 1px solid var(--md-sys-color-outline-variant);
  padding: 0.5rem 0.65rem;
  vertical-align: top;
}

.email-body-content th {
  background: color-mix(in srgb, var(--md-sys-color-surface-container-highest) 80%, transparent);
  font-weight: 700;
}

.email-body-content img.email-html-image {
  display: block;
  max-width: 100%;
  height: auto;
  margin: 0.5rem 0;
  border-radius: var(--radius-sm);
}

.email-image-blocked {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.35rem 0.6rem;
  border-radius: 999px;
  border: 1px solid var(--md-sys-color-outline-variant);
  color: var(--md-sys-color-on-surface-variant);
  background: color-mix(in srgb, var(--md-sys-color-surface-container-highest) 68%, transparent);
  font-size: 0.72rem;
}

.email-body-content a {
  color: var(--md-sys-color-primary);
  text-decoration: underline;
  text-underline-offset: 0.18em;
  cursor: pointer;
}

.email-body-content a:hover {
  color: color-mix(in srgb, var(--md-sys-color-primary) 78%, white);
}

.email-body-empty {
  color: var(--md-sys-color-on-surface-variant);
}
.status-chip {
  border-radius: 999px;
  border: 1px solid var(--md-sys-color-outline-variant);
  padding: 2px 8px;
  font-size: 0.68rem;
  color: var(--md-sys-color-on-surface-variant);
}

/* ── Loading state ───────────────────────────────────────────────────── */
.loading-state {
  min-height: 280px;
  display: grid;
  place-items: center;
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.85rem;
}

/* ── Responsive ──────────────────────────────────────────────────────── */
@media (max-width: 1120px) {
  .main-grid {
    grid-template-columns: 1fr;
  }

  .week-grid {
    grid-template-columns: repeat(7, minmax(140px, 1fr));
  }

  .day-col {
    min-height: 320px;
  }
}

@media (max-width: 760px) {
  .dashboard {
    padding: 10px 8px 16px;
  }

  .week-grid {
    grid-template-columns: repeat(7, minmax(130px, 1fr));
  }

  .editor-row {
    grid-template-columns: 1fr;
  }
}
