[data-theme="dark"] {
  color-scheme: dark;
  --md-sys-color-primary: #8ab4f8;
  --md-sys-color-on-primary: #ffffff;
  --md-sys-color-primary-container: #174ea6;
  --md-sys-color-on-primary-container: #d2e3fc;
  --md-sys-color-secondary: #c4c7c5;
  --md-sys-color-on-secondary: #202124;
  --md-sys-color-surface: #202124;
  --md-sys-color-surface-container: #292a2d;
  --md-sys-color-surface-container-high: #303134;
  --md-sys-color-surface-container-highest: #3c4043;

  --md-sys-color-on-surface-variant: #bdc1c6;
  --md-sys-color-outline: #9aa0a6;
  --md-sys-color-outline-variant: #5f6368;
  --md-sys-color-error: #f28b82;
  --workspace-tint: #263b5a;
  --workspace-header: #292a2d;

  --accent-red: #c45a5a;
  --accent-amber: #d4a054;
  --accent-green: #7aad7a;

  --event-tomato: #f28b82;
  --event-flamingo: #f6aea9;
  --event-tangerine: #fdd663;
  --event-sage: #57bb8a;
  --event-basil: #43a047;
  --event-peacock: #4fc3f7;
  --event-blueberry: #9aa0ff;
  --event-lavender: #b39ddb;
  --event-grape: #c58af9;
  --event-graphite: #b0bec5;

  --md-sys-elevation-1: 0 2px 8px rgba(0, 0, 0, 0.35);
  --md-sys-elevation-2: 0 4px 14px rgba(0, 0, 0, 0.45);
  --md-sys-elevation-3: 0 6px 20px rgba(0, 0, 0, 0.5);

  --radius-xs: 6px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
}

[data-theme="light"] {
  color-scheme: light;
  --md-sys-color-primary: #1a73e8;
  --md-sys-color-on-primary: #ffffff;
  --md-sys-color-primary-container: #d2e3fc;
  --md-sys-color-on-primary-container: #174ea6;
  --md-sys-color-secondary: #5f6368;
  --md-sys-color-on-secondary: #ffffff;
  --md-sys-color-surface: #f8fafd;
  --md-sys-color-surface-container: #ffffff;
  --md-sys-color-surface-container-high: #f1f3f4;
  --md-sys-color-surface-container-highest: #e8eaed;
  --md-sys-color-surface-variant: #f1f3f4;
  --md-sys-color-on-surface: #202124;
  --md-sys-color-on-surface-variant: #5f6368;
  --md-sys-color-outline: #80868b;
  --md-sys-color-outline-variant: #dadce0;
  --md-sys-color-error: #d93025;
  --workspace-tint: #e8f0fe;
  --workspace-header: #ffffff;

  --accent-red: #b04040;
  --accent-amber: #b88030;
  --accent-green: #4a8a4a;

  --event-tomato: #d93025;
  --event-flamingo: #e67c73;
  --event-tangerine: #f6bf26;
  --event-sage: #33b679;
  --event-basil: #0b8043;
  --event-peacock: #039be5;
  --event-blueberry: #3f51b5;
  --event-lavender: #7986cb;
  --event-grape: #8e24aa;
  --event-graphite: #616161;

  --md-sys-elevation-1: 0 2px 8px rgba(0, 0, 0, 0.08);
  --md-sys-elevation-2: 0 4px 14px rgba(0, 0, 0, 0.12);
  --md-sys-elevation-3: 0 6px 20px rgba(0, 0, 0, 0.15);
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
}

body {
  background: var(--md-sys-color-surface);
  color: var(--md-sys-color-on-surface);
  font-family: "Google Sans", "Roboto", "Segoe UI", system-ui, -apple-system, sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: auto;
}

button,
input,
textarea,
select {
  font: inherit;
}

.dashboard {
  max-width: 1400px;
  margin: 0 auto;
  padding: 18px 16px 32px;
  display: grid;
  gap: 18px;
}

/* ── Top bar ─────────────────────────────────────────────────────────── */
.top-bar {
  background: var(--workspace-header);
  border: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 82%, transparent);
  border-radius: var(--radius-lg);
  box-shadow: var(--md-sys-elevation-1);
  padding: 15px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}

.top-brand {
  display: flex;
  align-items: center;
  min-width: 0;
  gap: 12px;
}

.workspace-mark {
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  border-radius: 12px;
  background: linear-gradient(135deg, #4285f4 0%, #1a73e8 100%);
  color: #fff;
  box-shadow: 0 3px 7px color-mix(in srgb, #1a73e8 30%, transparent);
  font-size: 1.02rem;
  font-weight: 700;
}

.top-bar h1 {
  margin: 0;
  font-size: 1.08rem;
  font-weight: 600;
  letter-spacing: -0.015em;
}

.top-eyebrow,
.calendar-kicker {
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.66rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.top-sub {
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.76rem;
  margin-top: 1px;
}

.quick-stats {
  display: inline-flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.stat-chip {
  border-radius: 999px;
  border: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 85%, transparent);
  background: var(--md-sys-color-surface-container-high);
  color: var(--md-sys-color-on-surface-variant);
  padding: 6px 10px;
  font-size: 0.72rem;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.stat-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--md-sys-color-primary);
}

.stat-chip-mail .stat-dot {
  background: #34a853;
}

/* ── Two-column layout ───────────────────────────────────────────────── */
.main-grid {
  display: grid;
  grid-template-columns: minmax(0, 68fr) minmax(320px, 32fr);
  gap: 18px;
}

.main-grid-full {
  grid-template-columns: 1fr;
}

.surface {
  background: var(--md-sys-color-surface-container);
  border: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 85%, transparent);
  border-radius: var(--radius-lg);
  box-shadow: var(--md-sys-elevation-1);
}

.calendar-shell {
  overflow: hidden;
  padding: 0;
}

.calendar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 18px 20px 16px;
  overflow-x: auto;
}

.calendar-heading {
  min-width: max-content;
}

.calendar-title-line {
  display: flex;
  align-items: center;
  gap: 9px;
  margin: 2px 0;
}

.calendar-title-line h2 {
  margin: 0;
  color: var(--md-sys-color-on-surface);
  font-size: 1.12rem;
  font-weight: 500;
  letter-spacing: -0.016em;
}

.calendar-count {
  border-radius: 999px;
  background: var(--workspace-tint);
  color: var(--md-sys-color-primary);
  font-size: 0.69rem;
  font-weight: 700;
  padding: 3px 7px;
}

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 11px;
  gap: 10px;
}

.section-title {
  color: var(--md-sys-color-on-surface);
  font-size: 0.98rem;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.section-subtitle {
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.73rem;
}

/* ── Navigation / chip buttons ───────────────────────────────────────── */
.week-nav {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px;
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: 999px;
}

.calendar-actions {
  display: inline-flex;
  align-items: center;
  justify-content: flex-end;
  gap: 7px;
  flex-wrap: wrap;
}

.calendar-select {
  position: relative;
}

.calendar-select summary {
  list-style: none;
}

.calendar-select summary::-webkit-details-marker {
  display: none;
}

.calendar-select-list {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  min-width: 260px;
  max-height: 260px;
  overflow: auto;
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: var(--radius-sm);
  background: var(--md-sys-color-surface-container-high);
  box-shadow: var(--md-sys-elevation-2);
  padding: 8px;
  z-index: 30;
  display: grid;
  gap: 6px;
}

.calendar-option {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  align-items: center;
  gap: 8px;
  font-size: 0.76rem;
  color: var(--md-sys-color-on-surface);
}

.calendar-option small {
  color: var(--md-sys-color-outline);
  font-size: 0.68rem;
}

.nav-btn,
.chip-btn,
.action-btn {
  border: 1px solid transparent;
  background: transparent;
  color: var(--md-sys-color-on-surface-variant);
  border-radius: 999px;
  padding: 6px 11px;
  font-size: 0.73rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.nav-btn:hover,
.chip-btn:hover,
.action-btn:hover {
  background: var(--workspace-tint);
  border-color: transparent;
  color: var(--md-sys-color-primary);
}

.nav-icon {
  width: 30px;
  height: 30px;
  padding: 0;
  display: grid;
  place-items: center;
  font-size: 1.3rem;
  line-height: 1;
}

.nav-today {
  padding-inline: 9px;
}

.create-event-btn {
  background: var(--md-sys-color-primary);
  color: var(--md-sys-color-on-primary);
  box-shadow: 0 1px 2px color-mix(in srgb, var(--md-sys-color-primary) 35%, transparent);
}

.create-event-btn:hover {
  background: color-mix(in srgb, var(--md-sys-color-primary) 88%, #000);
  color: var(--md-sys-color-on-primary);
}

/* ── Weekly calendar grid ────────────────────────────────────────────── */
.week-grid {
  display: grid;
  grid-template-columns: repeat(var(--day-count, 7), minmax(150px, 1fr));
  gap: 0;
  position: relative;
  isolation: isolate;
  overflow-x: auto;
  border-top: 1px solid var(--md-sys-color-outline-variant);
  padding-bottom: 0;
  scrollbar-gutter: stable both-edges;
}

.day-col {
  background: var(--md-sys-color-surface-container);
  border: 0;
  border-right: 1px solid var(--md-sys-color-outline-variant);
  padding: 12px 10px;
  min-height: 470px;
  overflow: visible;
  position: relative;
  z-index: 1;
}

.day-col:last-child {
  border-right: 0;
}

.day-col:hover {
  z-index: 15;
}

.day-col.today {
  background: color-mix(in srgb, var(--md-sys-color-primary) 3%, var(--md-sys-color-surface-container));
}

.day-head {
  min-height: 42px;
  margin-bottom: 12px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 6px;
}

.day-label {
  display: inline-flex;
  align-items: center;
  gap: 7px;
}

.day-label-name {
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.69rem;
  font-weight: 700;
  letter-spacing: 0.065em;
  text-transform: uppercase;
}

.day-label-number {
  width: 27px;
  height: 27px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  color: var(--md-sys-color-on-surface);
  font-size: 0.96rem;
  font-weight: 500;
}

.day-col.today .day-label-name {
  color: var(--md-sys-color-primary);
}

.day-col.today .day-label-number {
  background: var(--md-sys-color-primary);
  color: var(--md-sys-color-on-primary);
}

.day-all-day {
  display: grid;
  gap: 5px;
  margin-bottom: 10px;
}

.all-day-chip {
  font-size: 0.7rem;
  border-radius: 6px;
  padding: 4px 7px;
  background: var(--workspace-tint);
  color: var(--md-sys-color-primary);
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.3;
}

.day-events {
  display: grid;
  gap: 7px;
  overflow: visible;
}

.day-empty {
  color: var(--md-sys-color-outline);
  font-size: 0.7rem;
  padding: 12px 2px;
}

/* ── Event card ──────────────────────────────────────────────────────── */
.calendar-event {
  border-radius: 7px;
  border-left: 4px solid var(--event-color);
  background: color-mix(in srgb, var(--event-color) 16%, var(--md-sys-color-surface-container));
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--event-color) 22%, transparent);
  padding: 8px 9px;
  cursor: pointer;
  position: relative;
  z-index: 1;
  transition: background 0.15s;
}

.calendar-event:hover {
  background: color-mix(in srgb, var(--event-color) 26%, var(--md-sys-color-surface-container));
  box-shadow: var(--md-sys-elevation-1), inset 0 0 0 1px color-mix(in srgb, var(--event-color) 36%, transparent);
  z-index: 120;
}

.event-time {
  font-size: 0.68rem;
  color: color-mix(in srgb, var(--md-sys-color-on-surface) 72%, var(--event-color));
  font-weight: 700;
  letter-spacing: 0.01em;
}

.event-title {
  font-size: 0.76rem;
  font-weight: 600;
  margin-top: 2px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.event-meta {
  margin-top: 3px;
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.68rem;
}

/* ── Event hover tooltip ─────────────────────────────────────────────── */
.event-hover {
  display: none !important;
}

.event-tooltip-layer {
  position: fixed;
  z-index: 2147483000;
  min-width: 238px;
  max-width: 340px;
  border-radius: 12px;
  border: 1px solid var(--md-sys-color-outline-variant);
  background: var(--md-sys-color-surface);
  box-shadow: 0 6px 18px color-mix(in srgb, #000 24%, transparent), var(--md-sys-elevation-2);
  overflow: hidden;
  font-size: 0.74rem;
  line-height: 1.45;
  color: var(--md-sys-color-on-surface);
  word-break: break-word;
  max-height: 220px;
  overflow-y: auto;
  pointer-events: none;
}

.event-tooltip-head {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 11px 12px 7px;
}

.event-tooltip-color {
  width: 9px;
  height: 9px;
  margin-top: 4px;
  border-radius: 50%;
  flex: 0 0 auto;
  background: var(--tooltip-color, var(--md-sys-color-primary));
}

.event-tooltip-title {
  color: var(--md-sys-color-on-surface);
  font-size: 0.82rem;
  font-weight: 650;
  line-height: 1.3;
}

.event-tooltip-content {
  display: grid;
  gap: 5px;
  padding: 1px 12px 10px 29px;
  color: var(--md-sys-color-on-surface-variant);
}

.event-tooltip-description {
  margin-top: 3px;
  padding-top: 8px;
  border-top: 1px solid var(--md-sys-color-outline-variant);
  color: var(--md-sys-color-on-surface);
}

.event-tooltip-foot {
  padding: 7px 12px;
  border-top: 1px solid var(--md-sys-color-outline-variant);
  background: var(--md-sys-color-surface-container);
  color: var(--md-sys-color-primary);
  font-size: 0.7rem;
  font-weight: 600;
}

/* ── Event inline actions (shown on hover) ───────────────────────────── */
.event-actions {
  margin-top: 4px;
  display: none;
  flex-wrap: wrap;
  gap: 3px;
}

.calendar-event:hover .event-actions {
  display: flex;
}

.rsvp-chip {
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: 999px;
  background: transparent;
  font-size: 0.68rem;
  padding: 2px 7px;
  cursor: pointer;
  color: var(--md-sys-color-on-surface-variant);
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.rsvp-chip:hover {
  border-color: var(--md-sys-color-primary);
  color: var(--md-sys-color-primary);
}

.rsvp-chip.active {
  background: var(--md-sys-color-primary);
  border-color: var(--md-sys-color-primary);
  color: var(--md-sys-color-on-primary);
}

/* ── Sidebar ─────────────────────────────────────────────────────────── */
.sidebar {
  display: grid;
  gap: 16px;
  align-content: start;
}

.inbox-shell {
  overflow: hidden;
  padding: 16px 0 0;
  border-radius: var(--radius-lg);
}

.inbox-shell .section-head {
  margin: 0;
  padding: 0 16px 12px;
}

/* ── Inbox ────────────────────────────────────────────────────────────── */
.inbox-list {
  display: grid;
  gap: 0;
  max-height: 460px;
  overflow: auto;
  border-top: 1px solid var(--md-sys-color-outline-variant);
}

.inbox-row {
  display: grid;
  grid-template-columns: 34px minmax(0, 1fr) auto;
  align-items: center;
  gap: 9px;
  min-height: 61px;
  padding: 10px 13px;
  border-bottom: 1px solid var(--md-sys-color-outline-variant);
  border-left: 3px solid transparent;
  cursor: pointer;
  transition: background 0.12s, box-shadow 0.12s;
}

.inbox-row:hover {
  background: color-mix(in srgb, var(--md-sys-color-primary) 8%, var(--md-sys-color-surface-container-high));
  box-shadow: inset 2px 0 0 var(--md-sys-color-primary);
}

.inbox-row.unread {
  background: var(--workspace-tint);
  border-left-color: var(--md-sys-color-primary);
}

.avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: color-mix(in srgb, var(--md-sys-color-primary) 18%, transparent);
  color: var(--md-sys-color-primary);
  display: grid;
  place-items: center;
  font-size: 0.72rem;
  font-weight: 700;
}

.mail-avatar {
  background: color-mix(in srgb, var(--md-sys-color-primary) 20%, var(--md-sys-color-surface-container-highest));
}

.mail-content {
  min-width: 0;
}

.mail-from {
  font-size: 0.76rem;
  font-weight: 600;
  color: var(--md-sys-color-on-surface);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.mail-subject {
  margin-top: 1px;
  font-size: 0.72rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--md-sys-color-on-surface);
}

.mail-subject.unread {
  font-weight: 650;
  color: var(--md-sys-color-on-surface);
}

.mail-subject span {
  color: var(--md-sys-color-on-surface-variant);
  font-weight: 400;
}

.inbox-title span {
  margin-left: 6px;
  color: var(--md-sys-color-on-primary-container);
  background: var(--md-sys-color-primary-container);
  border-radius: 999px;
  padding: 3px 7px;
  font-size: 0.66rem;
  font-weight: 600;
}

.mail-date {
  align-self: start;
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.67rem;
  font-weight: 600;
  padding-left: 5px;
  white-space: nowrap;
}

/* ── Overlay panels (event detail / email detail) ────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: grid;
  place-items: center;
  padding: 20px;
  z-index: 50;
}

.panel {
  width: min(780px, 94vw);
  max-height: 88vh;
  overflow: auto;
  border-radius: var(--radius-lg);
  border: 1px solid var(--md-sys-color-outline-variant);
  background: var(--md-sys-color-surface-container);
  box-shadow: var(--md-sys-elevation-3);
  padding: 18px;
}

.panel-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.panel-title {
  font-size: 1.05rem;
  font-weight: 500;
  letter-spacing: -0.01em;
}

.panel-sub {
  font-size: 0.8rem;
  color: var(--md-sys-color-on-surface-variant);
  margin-top: 2px;
}

.panel-body {
  margin-top: 14px;
  display: grid;
  gap: 10px;
}

.event-editor-form {
  display: grid;
  gap: 10px;
}

.editor-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.editor-field {
  display: grid;
  gap: 4px;
  font-size: 0.74rem;
  color: var(--md-sys-color-on-surface-variant);
}

.editor-field input,
.editor-field textarea,
.editor-field select {
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: var(--radius-xs);
  background: var(--md-sys-color-surface-container-high);
  color: var(--md-sys-color-on-surface);
  padding: 7px 8px;
}

.editor-field textarea {
  min-height: 76px;
  resize: vertical;
}

.editor-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  flex-wrap: wrap;
}

.inline-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.76rem;
  color: var(--md-sys-color-on-surface-variant);
}

.banner {
  border-radius: var(--radius-sm);
  border: 1px solid var(--md-sys-color-outline-variant);
  background: var(--md-sys-color-surface-container);
  color: var(--md-sys-color-on-surface-variant);
  padding: 8px 10px;
  font-size: 0.76rem;
}

.banner.error {
  border-color: color-mix(in srgb, var(--md-sys-color-error) 70%, transparent);
  color: var(--md-sys-color-error);
}

.detail-block {
  background: var(--md-sys-color-surface-container-high);
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 0.8rem;
  line-height: 1.5;
}

.detail-block a {
  color: var(--md-sys-color-primary);
  text-decoration: none;
}

.detail-block a:hover {
  text-decoration: underline;
}

.attendee-list {
  margin: 0;
  padding-left: 18px;
  display: grid;
  gap: 4px;
}

.attachment-list {
  margin: 0;
  padding-left: 18px;
  display: grid;
  gap: 6px;
}

.attachment-link {
  color: var(--md-sys-color-primary);
  text-decoration: none;
}

.attachment-link:hover {
  text-decoration: underline;
}

.email-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.email-panel {
  width: min(920px, 96vw);
  padding: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--md-sys-color-surface);
}

.event-panel {
  width: min(760px, 96vw);
  padding: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--md-sys-color-surface);
}

.event-toolbar {
  min-height: 54px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--md-sys-color-outline-variant);
  background: var(--md-sys-color-surface-container);
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.82rem;
  font-weight: 600;
}

.event-toolbar .nav-btn {
  margin-left: auto;
}

.event-panel-body {
  gap: 16px;
  padding: 22px clamp(18px, 4vw, 36px) 28px;
  margin-top: 0;
  min-height: 0;
  overflow-y: auto;
  overscroll-behavior: contain;
  scrollbar-gutter: stable;
}

.event-subject-line {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.event-color-dot {
  width: 13px;
  height: 13px;
  margin-top: 6px;
  border-radius: 50%;
  flex: 0 0 auto;
  background: var(--md-sys-color-primary);
}

.event-subject-line h2 {
  margin: 0;
  color: var(--md-sys-color-on-surface);
  font-size: clamp(1.15rem, 2vw, 1.45rem);
  line-height: 1.3;
  font-weight: 500;
}

.event-when {
  margin-top: 4px;
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.82rem;
}

.event-command-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  padding: 10px 0;
  border-block: 1px solid var(--md-sys-color-outline-variant);
}

.event-info-list {
  display: grid;
  gap: 12px;
}

.event-info-row {
  display: grid;
  grid-template-columns: 24px minmax(0, 1fr);
  gap: 10px;
  align-items: start;
  color: var(--md-sys-color-on-surface);
  font-size: 0.84rem;
  line-height: 1.45;
}

.event-info-icon {
  color: var(--md-sys-color-on-surface-variant);
  font-size: 1rem;
  line-height: 1.25;
  text-align: center;
}

.event-info-label {
  display: block;
  margin-bottom: 2px;
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.event-description {
  white-space: pre-wrap;
  word-break: break-word;
}

.event-attendee-list {
  margin: 0;
  padding: 0;
  list-style: none;
  display: grid;
  gap: 8px;
}

.event-attendee {
  display: grid;
  grid-template-columns: 30px minmax(0, 1fr) auto;
  align-items: center;
  gap: 8px;
}

.event-attendee-avatar {
  width: 30px;
  height: 30px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: var(--md-sys-color-primary-container);
  color: var(--md-sys-color-on-primary-container);
  font-size: 0.66rem;
  font-weight: 700;
}

.event-attendee-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.event-attendee-status {
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.72rem;
  text-transform: capitalize;
}

.event-attachments {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.event-attachment {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  max-width: 100%;
  padding: 7px 9px;
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: 8px;
  background: var(--md-sys-color-surface-container-high);
}

.event-attachment-label {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 0.76rem;
}

.email-panel-body {
  gap: 14px;
  padding: 22px clamp(18px, 4vw, 42px) 26px;
  margin-top: 0;
  min-height: 0;
  overflow-y: auto;
  overscroll-behavior: contain;
  scrollbar-gutter: stable;
}

.email-toolbar {
  min-height: 54px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--md-sys-color-outline-variant);
  background: var(--md-sys-color-surface-container);
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.82rem;
  font-weight: 600;
}

.email-toolbar .nav-btn {
  margin-left: auto;
}

.email-back {
  width: 34px;
  height: 34px;
  border: 0;
  border-radius: 50%;
  background: transparent;
  color: var(--md-sys-color-on-surface);
  cursor: pointer;
  font-size: 1.25rem;
  line-height: 1;
}

.email-back:hover {
  background: color-mix(in srgb, var(--md-sys-color-primary) 14%, transparent);
}

.email-subject-line {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.email-subject-line h2 {
  margin: 0;
  color: var(--md-sys-color-on-surface);
  font-size: clamp(1.15rem, 2vw, 1.45rem);
  line-height: 1.3;
  font-weight: 500;
}

.email-sender-row {
  display: grid;
  grid-template-columns: 42px minmax(0, 1fr) auto;
  align-items: center;
  gap: 10px;
  padding: 12px 0 4px;
}

.email-sender-avatar {
  width: 42px;
  height: 42px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: var(--md-sys-color-primary-container);
  color: var(--md-sys-color-on-primary-container);
  font-size: 0.78rem;
  font-weight: 700;
}

.email-sender-identities {
  min-width: 0;
  font-size: 0.82rem;
  color: var(--md-sys-color-on-surface);
}

.email-sender-identities span,
.email-recipient-extra,
.email-sender-row time {
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.72rem;
}

.email-sender-row time {
  text-align: right;
  white-space: nowrap;
}

.email-attachments {
  padding: 11px 13px;
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: 12px;
  background: var(--md-sys-color-surface-container);
  font-size: 0.76rem;
}

.email-attachments .attachment-list {
  margin-top: 8px;
}

.gmail-message-surface {
  border-radius: 12px;
  box-shadow: var(--md-sys-elevation-1);
}

.email-footer-actions {
  display: flex;
  justify-content: flex-end;
  padding-top: 2px;
}

.email-chip {
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: 999px;
  background: transparent;
  font-size: 0.72rem;
  padding: 5px 10px;
  cursor: pointer;
  color: var(--md-sys-color-on-surface-variant);
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.email-chip:hover {
  border-color: var(--md-sys-color-primary);
  color: var(--md-sys-color-primary);
  background: color-mix(in srgb, var(--md-sys-color-primary) 12%, transparent);
}

.email-chip.active {
  border-color: var(--md-sys-color-primary);
  color: var(--md-sys-color-on-primary);
  background: var(--md-sys-color-primary);
}

.email-statuses {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.email-meta-grid {
  display: grid;
  gap: 8px;
}

.email-body-block {
  padding: 0;
  overflow: hidden;
}

.email-body-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--md-sys-color-outline-variant);
  background: color-mix(in srgb, var(--md-sys-color-surface-container) 82%, transparent);
}

.email-body-mode {
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--md-sys-color-on-surface-variant);
}

.email-body-content {
  padding: clamp(18px, 4vw, 34px);
  max-height: min(58vh, 760px);
  overflow: auto;
  background:
    linear-gradient(180deg, color-mix(in srgb, var(--md-sys-color-surface) 88%, transparent), transparent 90px),
    var(--md-sys-color-surface);
  color: var(--md-sys-color-on-surface);
}

.email-body-content p,
.email-body-content ul,
.email-body-content ol,
.email-body-content pre,
.email-body-content blockquote,
.email-body-content table,
.email-body-content h1,
.email-body-content h2,
.email-body-content h3,
.email-body-content h4,
.email-body-content h5,
.email-body-content h6 {
  margin: 0 0 0.9rem;
}

.email-body-content p:last-child,
.email-body-content ul:last-child,
.email-body-content ol:last-child,
.email-body-content pre:last-child,
.email-body-content blockquote:last-child,
.email-body-content table:last-child {
  margin-bottom: 0;
}

.email-body-content h1,
.email-body-content h2,
.email-body-content h3,
.email-body-content h4,
.email-body-content h5,
.email-body-content h6 {
  line-height: 1.25;
  color: var(--md-sys-color-on-surface);
}

.email-body-content h1 { font-size: 1.35rem; }
.email-body-content h2 { font-size: 1.2rem; }
.email-body-content h3 { font-size: 1.06rem; }
.email-body-content h4,
.email-body-content h5,
.email-body-content h6 { font-size: 0.95rem; }

.email-body-content ul,
.email-body-content ol {
  padding-left: 1.25rem;
}

.email-body-content li + li {
  margin-top: 0.35rem;
}

.email-body-content blockquote {
  padding: 0.85rem 1rem;
  border-left: 3px solid color-mix(in srgb, var(--md-sys-color-primary) 70%, transparent);
  background: color-mix(in srgb, var(--md-sys-color-primary) 8%, transparent);
  color: var(--md-sys-color-on-surface-variant);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}

.email-body-content pre,
.email-body-content code {
  font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
}

.email-body-content pre {
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  padding: 0.9rem 1rem;
  border-radius: var(--radius-sm);
  background: color-mix(in srgb, var(--md-sys-color-surface-container-highest) 84%, transparent);
  border: 1px solid var(--md-sys-color-outline-variant);
}

.email-body-content table {
  border-collapse: collapse;
  max-width: 100%;
}

.email-body-content .email-layout-table {
  margin: 0;
}

.email-body-content .email-layout-table td,
.email-body-content .email-layout-table th {
  border: 0;
}

.email-body-content .email-data-table {
  width: 100%;
  margin: 0.9rem 0;
  border: 1px solid var(--md-sys-color-outline-variant);
}

.email-body-content .email-data-table th,
.email-body-content .email-data-table td {
  border: 1px solid var(--md-sys-color-outline-variant);
  padding: 0.5rem 0.65rem;
  vertical-align: top;
}

.email-body-content .email-data-table th {
  background: color-mix(in srgb, var(--md-sys-color-surface-container-highest) 80%, transparent);
  font-weight: 700;
}

.email-body-content img.email-html-image {
  display: block;
  max-width: 100%;
  height: auto;
  margin: 0.5rem 0;
  border-radius: var(--radius-sm);
}

.email-image-blocked {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.35rem 0.6rem;
  border-radius: 999px;
  border: 1px solid var(--md-sys-color-outline-variant);
  color: var(--md-sys-color-on-surface-variant);
  background: color-mix(in srgb, var(--md-sys-color-surface-container-highest) 68%, transparent);
  font-size: 0.72rem;
}

.email-body-content a {
  color: var(--md-sys-color-primary);
  text-decoration: underline;
  text-underline-offset: 0.18em;
  cursor: pointer;
}

.email-body-content a:hover {
  color: color-mix(in srgb, var(--md-sys-color-primary) 78%, white);
}

.email-body-empty {
  color: var(--md-sys-color-on-surface-variant);
}
.status-chip {
  border-radius: 999px;
  border: 1px solid var(--md-sys-color-outline-variant);
  padding: 2px 8px;
  font-size: 0.68rem;
  color: var(--md-sys-color-on-surface-variant);
}

/* ── Loading state ───────────────────────────────────────────────────── */
.loading-state {
  min-height: 280px;
  display: grid;
  place-items: center;
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.85rem;
}

/* ── Responsive ──────────────────────────────────────────────────────── */
@media (max-width: 1120px) {
  .main-grid {
    grid-template-columns: 1fr;
  }

  .week-grid {
    grid-template-columns: repeat(var(--day-count, 7), minmax(140px, 1fr));
  }

  .day-col {
    min-height: 320px;
  }
}

@media (max-width: 760px) {
  .dashboard {
    padding: 10px 8px 20px;
    gap: 12px;
  }

  .top-bar {
    align-items: flex-start;
    flex-direction: column;
    padding: 14px;
  }

  .quick-stats {
    justify-content: flex-start;
  }

  .calendar-header {
    align-items: flex-start;
    flex-direction: column;
    padding: 16px 14px 14px;
  }

  .calendar-actions {
    justify-content: flex-start;
  }

  .calendar-title-line h2 {
    font-size: 1rem;
  }

  .week-grid {
    grid-template-columns: repeat(var(--day-count, 7), minmax(128px, 1fr));
  }

  .day-col {
    min-height: 380px;
    padding: 10px 8px;
  }

  .inbox-row {
    grid-template-columns: 30px minmax(0, 1fr) auto;
    min-height: 56px;
    padding: 9px 10px;
  }

  .avatar {
    width: 30px;
    height: 30px;
  }

  .email-panel {
    width: 100%;
    max-height: 100vh;
    border-radius: 0;
  }

  .email-panel-body {
    padding: 18px;
  }

  .email-subject-line {
    align-items: flex-start;
    flex-direction: column;
    gap: 8px;
  }

  .email-sender-row {
    grid-template-columns: 38px minmax(0, 1fr);
    align-items: start;
  }

  .email-sender-avatar {
    width: 38px;
    height: 38px;
  }

  .email-sender-row time {
    grid-column: 2;
    text-align: left;
  }

  .email-footer-actions {
    justify-content: flex-start;
  }

  .editor-row {
    grid-template-columns: 1fr;
  }
}
