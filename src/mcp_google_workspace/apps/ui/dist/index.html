.dashboard {
  max-width: 1360px;
  margin: 0 auto;
  padding: 24px 20px 40px;
  display: grid;
  gap: 18px;
}

/* ── Top bar ─────────────────────────────────────────────────────────── */
.top-bar {
  background: var(--md-sys-color-surface-container);
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: var(--radius-md);
  box-shadow: var(--md-sys-elevation-1);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.top-bar h1 {
  margin: 0;
  font-size: 1.15rem;
  font-weight: 500;
  letter-spacing: -0.01em;
}

.top-sub {
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.82rem;
  margin-top: 2px;
}

.quick-stats {
  display: inline-flex;
  gap: 8px;
  flex-wrap: wrap;
}

.stat-chip {
  border-radius: 999px;
  border: 1px solid var(--md-sys-color-outline-variant);
  background: var(--md-sys-color-surface-variant);
  color: var(--md-sys-color-on-surface-variant);
  padding: 5px 10px;
  font-size: 0.76rem;
  font-weight: 500;
}

/* ── Two-column layout ───────────────────────────────────────────────── */
.main-grid {
  display: grid;
  grid-template-columns: minmax(0, 65fr) minmax(320px, 35fr);
  gap: 16px;
}

.main-grid-full {
  grid-template-columns: 1fr;
}

.surface {
  background: var(--md-sys-color-surface-container);
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: var(--radius-md);
  box-shadow: var(--md-sys-elevation-1);
}

.calendar-shell {
  padding: 14px;
}

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  gap: 10px;
}

.section-title {
  font-size: 0.82rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--md-sys-color-on-surface-variant);
}

.section-subtitle {
  font-size: 0.78rem;
  color: var(--md-sys-color-outline);
}

/* ── Navigation / chip buttons ───────────────────────────────────────── */
.week-nav {
  display: inline-flex;
  gap: 6px;
}

.nav-btn,
.chip-btn,
.action-btn {
  border: 1px solid var(--md-sys-color-outline-variant);
  background: transparent;
  color: var(--md-sys-color-on-surface-variant);
  border-radius: 999px;
  padding: 5px 10px;
  font-size: 0.76rem;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.nav-btn:hover,
.chip-btn:hover,
.action-btn:hover {
  background: color-mix(in srgb, var(--md-sys-color-primary) 12%, transparent);
  border-color: var(--md-sys-color-primary);
  color: var(--md-sys-color-primary);
}

/* ── Weekly calendar grid ────────────────────────────────────────────── */
.week-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 8px;
}

.day-col {
  background: var(--md-sys-color-surface-container-high);
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: var(--radius-sm);
  padding: 8px;
  min-height: 540px;
  overflow: visible;
}

.day-col.today {
  border-color: var(--md-sys-color-primary);
  background: color-mix(in srgb, var(--md-sys-color-primary) 5%, var(--md-sys-color-surface-container-high));
}

.day-head {
  font-size: 0.76rem;
  color: var(--md-sys-color-on-surface-variant);
  margin-bottom: 8px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
}

.day-col.today .day-head {
  color: var(--md-sys-color-primary);
}

.day-all-day {
  display: grid;
  gap: 4px;
  margin-bottom: 8px;
}

.all-day-chip {
  font-size: 0.72rem;
  border-radius: var(--radius-xs);
  padding: 3px 7px;
  background: color-mix(in srgb, var(--md-sys-color-primary) 15%, transparent);
  color: var(--md-sys-color-primary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.3;
}

.day-events {
  display: grid;
  gap: 6px;
  overflow: visible;
}

/* ── Event card ──────────────────────────────────────────────────────── */
.calendar-event {
  border-radius: var(--radius-xs);
  border-left: 3px solid var(--event-color);
  background: color-mix(in srgb, var(--event-color) 10%, var(--md-sys-color-surface-container));
  padding: 7px 8px;
  cursor: pointer;
  position: relative;
  transition: background 0.15s;
}

.calendar-event:hover {
  background: color-mix(in srgb, var(--event-color) 20%, var(--md-sys-color-surface-container));
}

.event-time {
  font-size: 0.7rem;
  color: var(--md-sys-color-outline);
  font-weight: 600;
  letter-spacing: 0.01em;
}

.event-title {
  font-size: 0.78rem;
  font-weight: 500;
  margin-top: 1px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.event-meta {
  margin-top: 2px;
  color: var(--md-sys-color-outline);
  font-size: 0.7rem;
}

/* ── Event hover tooltip ─────────────────────────────────────────────── */
.event-hover {
  display: none;
  position: absolute;
  left: -4px;
  right: -4px;
  bottom: calc(100% + 4px);
  border-radius: var(--radius-sm);
  border: 1px solid var(--md-sys-color-outline-variant);
  background: var(--md-sys-color-surface-container-high);
  box-shadow: var(--md-sys-elevation-2);
  padding: 8px 10px;
  z-index: 20;
  font-size: 0.74rem;
  line-height: 1.45;
  color: var(--md-sys-color-on-surface);
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 200px;
  overflow-y: auto;
  pointer-events: none;
}

.calendar-event:hover .event-hover {
  display: block;
}

/* ── Event inline actions (shown on hover) ───────────────────────────── */
.event-actions {
  margin-top: 4px;
  display: none;
  flex-wrap: wrap;
  gap: 3px;
}

.calendar-event:hover .event-actions {
  display: flex;
}

.rsvp-chip {
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: 999px;
  background: transparent;
  font-size: 0.68rem;
  padding: 2px 7px;
  cursor: pointer;
  color: var(--md-sys-color-on-surface-variant);
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.rsvp-chip:hover {
  border-color: var(--md-sys-color-primary);
  color: var(--md-sys-color-primary);
}

.rsvp-chip.active {
  background: var(--md-sys-color-primary);
  border-color: var(--md-sys-color-primary);
  color: var(--md-sys-color-on-primary);
}

/* ── Sidebar ─────────────────────────────────────────────────────────── */
.sidebar {
  display: grid;
  gap: 12px;
  align-content: start;
}

.inbox-shell {
  padding: 12px;
}

/* ── Inbox ────────────────────────────────────────────────────────────── */
.inbox-list {
  display: grid;
  gap: 1px;
  max-height: 460px;
  overflow: auto;
}

.inbox-row {
  display: grid;
  grid-template-columns: 30px minmax(0, 1fr) auto;
  align-items: center;
  gap: 8px;
  padding: 7px 6px;
  border-radius: var(--radius-xs);
  cursor: pointer;
  transition: background 0.12s;
}

.inbox-row:hover {
  background: var(--md-sys-color-surface-variant);
}

.avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: color-mix(in srgb, var(--md-sys-color-primary) 18%, transparent);
  color: var(--md-sys-color-primary);
  display: grid;
  place-items: center;
  font-size: 0.72rem;
  font-weight: 700;
}

.mail-content {
  min-width: 0;
}

.mail-subject {
  font-size: 0.78rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--md-sys-color-on-surface);
}

.mail-subject.unread {
  font-weight: 700;
}

.mail-subline {
  font-size: 0.7rem;
  color: var(--md-sys-color-outline);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.mail-date {
  font-size: 0.68rem;
  color: var(--md-sys-color-outline);
  padding-left: 6px;
  white-space: nowrap;
}

/* ── Overlay panels (event detail / email detail) ────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: grid;
  place-items: center;
  padding: 20px;
  z-index: 50;
}

.panel {
  width: min(780px, 94vw);
  max-height: 88vh;
  overflow: auto;
  border-radius: var(--radius-lg);
  border: 1px solid var(--md-sys-color-outline-variant);
  background: var(--md-sys-color-surface-container);
  box-shadow: var(--md-sys-elevation-3);
  padding: 18px;
}

.panel-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.panel-title {
  font-size: 1.05rem;
  font-weight: 500;
  letter-spacing: -0.01em;
}

.panel-sub {
  font-size: 0.8rem;
  color: var(--md-sys-color-on-surface-variant);
  margin-top: 2px;
}

.panel-body {
  margin-top: 14px;
  display: grid;
  gap: 10px;
}

.detail-block {
  background: var(--md-sys-color-surface-container-high);
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 0.8rem;
  line-height: 1.5;
}

.detail-block a {
  color: var(--md-sys-color-primary);
  text-decoration: none;
}

.detail-block a:hover {
  text-decoration: underline;
}

.attendee-list {
  margin: 0;
  padding-left: 18px;
  display: grid;
  gap: 4px;
}

/* ── Loading state ───────────────────────────────────────────────────── */
.loading-state {
  min-height: 280px;
  display: grid;
  place-items: center;
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.85rem;
}

/* ── Responsive ──────────────────────────────────────────────────────── */
@media (max-width: 1120px) {
  .main-grid {
    grid-template-columns: 1fr;
  }

  .day-col {
    min-height: 320px;
  }
}

@media (max-width: 760px) {
  .week-grid {
    grid-template-columns: repeat(7, minmax(170px, 1fr));
    overflow-x: auto;
    padding-bottom: 6px;
  }
}
